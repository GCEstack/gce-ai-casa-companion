<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Casa Voice V2</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF8C42">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { color: #FF8C42; margin-bottom: 10px; }
        .connection-status { font-size: 12px; margin-bottom: 15px; padding: 4px 12px; border-radius: 12px; }
        .connection-status.connected { background: #2a5a2a; color: #8f8; }
        .connection-status.disconnected { background: #5a2a2a; color: #f88; }
        #avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: #2a2a4a; border: 3px solid #FF8C42;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; font-size: 48px; margin-bottom: 15px;
            user-select: none;
        }
        #avatar:hover { transform: scale(1.1); }
        #avatar.speaking { background: #FF8C42; box-shadow: 0 0 20px rgba(255,140,66,0.4); }
        #avatar.listening { background: #3a3a5a; border-color: #8f8; }
        #avatar.wake_detected { background: #3a3a5a; border-color: #ff0; }
        #status { font-size: 14px; color: #aaa; margin-bottom: 15px; min-height: 20px; text-align: center; }
        #talkBtn {
            width: 80px; height: 80px; border-radius: 50%;
            background: #2a2a4a; border: 3px solid #FF8C42;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; font-size: 32px; margin-bottom: 15px;
            user-select: none;
        }
        #talkBtn.recording { background: #FF8C42; transform: scale(1.05); box-shadow: 0 0 20px rgba(255,140,66,0.4); }
        #talkBtn:hover { transform: scale(1.1); }
        #transcript {
            background: #2a2a4a; padding: 12px; border-radius: 10px;
            max-width: 400px; width: 100%; min-height: 40px;
            font-size: 14px; color: #ccc; margin-bottom: 15px; text-align: center;
        }
        .char-grid, .mode-grid {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            max-width: 400px; width: 100%; margin-bottom: 12px;
        }
        .char-btn, .mode-btn {
            padding: 8px 16px; border: 2px solid #444; border-radius: 8px;
            background: #2a2a4a; color: #eee; cursor: pointer; font-size: 14px;
            transition: all 0.2s;
        }
        .char-btn:hover, .mode-btn:hover { border-color: #FF8C42; }
        .char-btn.active, .mode-btn.active { background: #FF8C42; color: #1a1a2e; border-color: #FF8C42; }
        .mic-select {
            max-width: 400px; width: 100%; margin-bottom: 10px;
        }
        .mic-select label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
        .mic-select select {
            width: 100%; padding: 8px; border-radius: 8px;
            background: #2a2a4a; color: #eee; border: 1px solid #444;
            font-size: 14px;
        }
        .volume-bar {
            width: 100%; max-width: 400px; height: 6px; background: #2a2a4a;
            border-radius: 3px; margin-bottom: 12px; overflow: hidden;
        }
        .volume-bar-fill {
            height: 100%; width: 0%; background: #FF8C42;
            transition: width 0.05s;
        }
        .volume-control {
            display: flex; align-items: center; gap: 10px;
            max-width: 400px; width: 100%; margin-bottom: 15px;
        }
        .volume-control label { font-size: 12px; color: #888; }
        #volumeSlider { flex: 1; }
        #volumeValue { font-size: 12px; color: #888; min-width: 35px; }
        .hint { font-size: 11px; color: #888; margin-top: 10px; text-align: center; }
        .hint code { background: #2a2a4a; padding: 2px 6px; border-radius: 4px; }
        #debugLog {
            max-width: 400px; width: 100%; max-height: 100px; overflow-y: auto;
            background: #111; color: #0f0; font-size: 10px; font-family: monospace;
            padding: 8px; border-radius: 8px; margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Casa Voice V2</h1>
    <div id="connStatus" class="connection-status disconnected">Offline</div>

    <div id="avatar" title="Tap while speaking to interrupt">🐻</div>
    <p id="status">Click 🎤 to start mic | Say "Hello" to wake</p>

    <div class="mic-select">
        <label>Microphone</label>
        <select id="micSelect"><option value="">Default</option></select>
    </div>
    <div class="volume-bar"><div class="volume-bar-fill" id="volumeFill"></div></div>

    <div id="talkBtn">🎙️</div>

    <div id="transcript"></div>

    <div class="char-grid">
        <button class="char-btn active" data-character="orsetto">🐻 Bear</button>
        <button class="char-btn" data-character="coniglio">🐰 Rabbit</button>
        <button class="char-btn" data-character="drago">🐉 Dragon</button>
    </div>

    <div class="mode-grid">
        <button class="mode-btn active" data-mode="default">Chat</button>
        <button class="mode-btn" data-mode="story">📖 Story</button>
        <button class="mode-btn" data-mode="play">🎮 Play</button>
        <button class="mode-btn" data-mode="bedtime">🌙 Sleep</button>
        <button class="mode-btn" data-mode="sing">🎵 Sing</button>
    </div>

    <div class="volume-control">
        <label>Volume</label>
        <input type="range" id="volumeSlider" min="0" max="100" value="80">
        <span id="volumeValue">80%</span>
    </div>

    <p class="hint">
        <strong>Click 🎤</strong> to start mic — <strong>click again</strong> to stop<br>
        <strong>Say "Hello" or "Wake up"</strong> to wake the companion<br>
        <strong>Tap</strong> 🐻 while speaking to interrupt<br>
        <kbd>Space</kbd> = Toggle mic &nbsp; <kbd>R</kbd> = Reset
    </p>

    <div id="debugLog"></div>

    <script src="app.js"></script>
</body>
</html>
