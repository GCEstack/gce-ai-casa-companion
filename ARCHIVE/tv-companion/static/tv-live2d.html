<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Casa Companion — Live</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#status { position: fixed; top: 20px; right: 20px; width: 14px; height: 14px; border-radius: 50%; background: #333; z-index: 10; transition: background 0.3s; }
#status.idle { background: #555; }
#status.listening { background: #4287f5; box-shadow: 0 0 12px #4287f5; }
#status.thinking { background: #D4A017; box-shadow: 0 0 12px #D4A017; }
#status.speaking { background: #4CAF50; box-shadow: 0 0 12px #4CAF50; }
#char-name { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; z-index: 10; }
#transcript { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 16px; max-width: 80%; text-align: center; z-index: 10; opacity: 0; transition: opacity 0.5s; line-height: 1.5; }
#transcript.visible { opacity: 1; }
#tap-hint { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-size: 13px; z-index: 10; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.2; } 50% { opacity: 0.5; } }
#loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: rgba(255,255,255,0.3); font-size: 14px; z-index: 20; }
</style>
</head>
<body>

<div id="status" class="idle"></div>
<div id="char-name">Casa Companion</div>
<div id="transcript"></div>
<div id="tap-hint">Tap anywhere to talk</div>
<div id="loading">Loading character...</div>

<!-- Live2D Cubism Core -->
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"
        onerror="loadFallbackCore()"></script>
<script>
function loadFallbackCore() {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/live2dcubismcore@1.0.2/live2dcubismcore.min.js';
    document.head.appendChild(s);
}
</script>

<!-- PixiJS v6 (required by pixi-live2d-display) -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>

<!-- pixi-live2d-display with lip sync patch -->
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display-lipsyncpatch/dist/cubism4.min.js"></script>

<script>
const { Live2DModel, MotionPriority } = PIXI.live2d;

// --- Config ---
const params = new URLSearchParams(window.location.search);
const characterKey = params.get('character') || 'stellino';

// Sample model for proof of concept (will be replaced with custom Casa Companion models)
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display/test/assets/haru/haru_greeter_t03.model3.json';

// --- State ---
let state = 'idle';
let model = null;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let conversationHistory = [];
let audioElement = null;

// --- PixiJS App ---
const app = new PIXI.Application({
    view: document.createElement('canvas'),
    autoStart: true,
    resizeTo: window,
    backgroundColor: 0x0a0a14,
    antialias: true,
});
document.body.appendChild(app.view);

// --- Load Model ---
(async function init() {
    try {
        model = await Live2DModel.from(MODEL_URL, { autoInteract: true });

        // Scale to fit
        fitModel();
        app.stage.addChild(model);

        // Handle resize
        window.addEventListener('resize', fitModel);

        // Tap interactions
        model.on('hit', (hitAreas) => {
            if (hitAreas.includes('body') || hitAreas.includes('head')) {
                model.motion('tap_body', undefined, MotionPriority.FORCE);
            }
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('char-name').textContent = characterKey.toUpperCase();

        // Auto-greet after 1 second
        setTimeout(greet, 1000);

    } catch (e) {
        document.getElementById('loading').textContent = 'Error loading model: ' + e.message;
        console.error(e);
    }
})();

function fitModel() {
    if (!model) return;
    const scale = Math.min(
        window.innerWidth / model.width,
        window.innerHeight / model.height
    ) * 0.85;
    model.scale.set(scale);
    model.x = (window.innerWidth - model.width * model.scale.x) / 2;
    model.y = (window.innerHeight - model.height * model.scale.y) / 2;
}

// --- State Management ---
function setState(s) {
    state = s;
    const el = document.getElementById('status');
    el.className = s;

    // Trigger expressions based on state
    if (!model) return;
    if (s === 'listening') {
        model.expression('f01');  // curious
    } else if (s === 'thinking') {
        model.internalModel.coreModel.setParameterValueById('ParamAngleY', 10);
        model.internalModel.coreModel.setParameterValueById('ParamEyeBallY', 0.5);
    } else if (s === 'speaking') {
        model.expression('f02');  // happy
    } else if (s === 'idle') {
        model.expression('f00');  // default
    }
}

// --- Transcript ---
function showTranscript(text) {
    const el = document.getElementById('transcript');
    el.textContent = text;
    el.classList.add('visible');
}

function hideTranscript() {
    document.getElementById('transcript').classList.remove('visible');
}

// --- Voice: Greet ---
async function greet() {
    setState('thinking');
    try {
        const resp = await fetch('/api/chat-and-speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: 'Say hello and introduce yourself warmly. Keep it short.',
                history: [],
                character: characterKey,
                mode: 'introduction',
                customName: null,
            }),
        });

        const buf = await resp.arrayBuffer();
        const view = new DataView(buf);
        const headerLen = view.getUint32(0);
        const headerBytes = new Uint8Array(buf, 4, headerLen);
        const header = JSON.parse(new TextDecoder().decode(headerBytes));
        const audioBytes = buf.slice(4 + headerLen);

        if (header.response) {
            showTranscript(header.response);
            conversationHistory.push({ role: 'assistant', content: header.response });
        }

        // Play with lip sync
        const blob = new Blob([audioBytes], { type: 'audio/mpeg' });
        const url = URL.createObjectURL(blob);
        playWithLipSync(url);

    } catch (e) {
        console.error('Greet failed:', e);
        setState('idle');
    }
}

// --- Voice: Play Audio with Live2D Lip Sync ---
function playWithLipSync(audioUrl) {
    setState('speaking');

    // Use the Live2D speak() method from the lipsync patch
    if (model && model.speak) {
        model.speak(audioUrl, {
            volume: 1.0,
            resetExpression: true,
            onFinish: () => {
                setState('idle');
                setTimeout(hideTranscript, 2000);
            },
            onError: (e) => {
                console.error('Speak error:', e);
                // Fallback: play audio normally
                playAudioFallback(audioUrl);
            }
        });
    } else {
        playAudioFallback(audioUrl);
    }
}

function playAudioFallback(audioUrl) {
    setState('speaking');
    if (audioElement) {
        audioElement.pause();
        audioElement = null;
    }
    audioElement = new Audio(audioUrl);

    // Manual lip sync via Web Audio API
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(audioElement);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function updateMouth() {
        if (state !== 'speaking') return;
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
        const mouthOpen = Math.min(1, avg / 80);
        if (model) {
            model.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', mouthOpen);
        }
        requestAnimationFrame(updateMouth);
    }

    audioElement.onplay = () => updateMouth();
    audioElement.onended = () => {
        setState('idle');
        setTimeout(hideTranscript, 2000);
        audioCtx.close();
    };
    audioElement.play().catch(e => {
        console.error('Audio play failed:', e);
        setState('idle');
    });
}

// --- Voice: Tap to Talk ---
document.addEventListener('click', async (e) => {
    // Don't trigger on status dot
    if (e.target.id === 'status') return;

    if (state === 'speaking') {
        // Stop current speech
        if (model && model.stopSpeaking) model.stopSpeaking();
        if (audioElement) { audioElement.pause(); audioElement = null; }
        setState('idle');
        hideTranscript();
        return;
    }

    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
});

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true }
        });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream, {
            mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4'
        });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            processRecording();
        };
        mediaRecorder.start();
        isRecording = true;
        setState('listening');
        document.getElementById('tap-hint').textContent = 'Tap to send';
    } catch (e) {
        console.error('Mic error:', e);
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
    }
    isRecording = false;
    document.getElementById('tap-hint').textContent = 'Tap anywhere to talk';
}

async function processRecording() {
    setState('thinking');
    const blob = new Blob(audioChunks, { type: audioChunks[0]?.type || 'audio/webm' });
    const formData = new FormData();
    formData.append('file', blob, 'recording.webm');

    try {
        // STT
        const sttResp = await fetch('/api/stt', { method: 'POST', body: formData });
        const sttData = await sttResp.json();
        const userText = sttData.text || '';

        if (!userText.trim()) {
            setState('idle');
            return;
        }

        conversationHistory.push({ role: 'user', content: userText });

        // Chat + Speak
        const resp = await fetch('/api/chat-and-speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: userText,
                history: conversationHistory.slice(-10),
                character: characterKey,
                mode: null,
                customName: null,
            }),
        });

        const buf = await resp.arrayBuffer();
        const view = new DataView(buf);
        const headerLen = view.getUint32(0);
        const headerBytes = new Uint8Array(buf, 4, headerLen);
        const header = JSON.parse(new TextDecoder().decode(headerBytes));
        const audioBytes = buf.slice(4 + headerLen);

        if (header.response) {
            showTranscript(header.response);
            conversationHistory.push({ role: 'assistant', content: header.response });
        }

        const audioBlob = new Blob([audioBytes], { type: 'audio/mpeg' });
        const url = URL.createObjectURL(audioBlob);
        playWithLipSync(url);

    } catch (e) {
        console.error('Process error:', e);
        setState('idle');
    }
}
</script>
</body>
</html>
