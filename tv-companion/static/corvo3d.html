<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corvo 3D — TRELLIS output</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 50% 30%, #0a0a18 0%, #020306 70%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
}
#label {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.4;
    z-index: 10;
}
#footer {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    opacity: 0.35;
    z-index: 10;
    text-align: center;
}
model-viewer {
    width: 100vw;
    height: 100vh;
    --poster-color: transparent;
    background: transparent;
}
</style>
</head>
<body>
<div id="label">Corvo · Hunyuan3D-2.1</div>
<model-viewer
    src="/static/models/corvo/corvo_hunyuan.glb"
    alt="Corvo 3D model from Hunyuan3D-2.1"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="20deg"
    exposure="1.1"
    shadow-intensity="0.8"
    environment-image="neutral"
    camera-orbit="0deg 75deg 3m"
    min-camera-orbit="auto auto 1m"
    max-camera-orbit="auto auto 10m"
    interaction-prompt="none"
>
</model-viewer>
<div id="footer">drag to orbit · scroll to zoom · first 3D pass, unrigged</div>
</body>
</html>
