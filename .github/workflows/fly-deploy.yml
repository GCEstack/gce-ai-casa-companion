name: Fly Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'web-revamp/**'
      - '.github/workflows/fly-deploy.yml'

jobs:
  deploy:
    name: Deploy casa-companion-app
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-revamp/package-lock.json

      - name: Install dependencies
        working-directory: web-revamp
        env:
          NODE_ENV: development
        run: npm ci

      - name: Build static site
        working-directory: web-revamp
        env:
          NODE_ENV: development
        run: npm run build

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy ./web-revamp --remote-only
