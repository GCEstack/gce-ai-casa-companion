<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa-Pipecat Voice Agent — Test Client</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f9fc;
            color: #1a202c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { margin-top: 0; font-size: 1.8rem; }
        .field { margin: 12px 0; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        .status {
            margin: 20px 0;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .status.idle { background: #edf2f7; color: #4a5568; }
        .status.listening { background: #c6f6d5; color: #22543d; }
        .status.speaking { background: #bee3f8; color: #2a4365; }
        .status.error { background: #fed7d7; color: #742a2a; }
        button {
            border: none;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.35);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(118, 75, 162, 0.45); }
        button:active { transform: translateY(0); }
        button:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; }
        .hint { margin-top: 24px; color: #718096; font-size: 0.9rem; line-height: 1.5; }
        .log {
            margin-top: 24px;
            max-height: 180px;
            overflow-y: auto;
            background: #f7fafc;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: left;
        }
        .log p { margin: 4px 0; }
        .log .user { color: #2f855a; }
        .log .bot { color: #2b6cb0; }
        .log .event { color: #744210; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Casa-Pipecat Voice Agent</h1>
        <p>Advanced low-latency voice companion.</p>

        <div class="field">
            <label for="deviceId">Device ID</label>
            <input id="deviceId" type="text" value="test-device-1">
        </div>

        <div class="field">
            <label for="token">Token</label>
            <input id="token" type="text" value="local-test-key">
        </div>

        <div class="field">
            <label for="character">Character</label>
            <select id="character">
                <option value="zippy">Zippy (robot)</option>
                <option value="breezy">Breezy (cloud)</option>
                <option value="spark">Spark (dragon)</option>
            </select>
        </div>

        <div class="field">
            <label for="childAge">Child age</label>
            <input id="childAge" type="number" value="7" min="1" max="12">
        </div>

        <div id="status" class="status idle">Ready</div>

        <button id="talkBtn" disabled>Start</button>

        <div class="hint">
            Uses your microphone. Audio is sent raw PCM 16kHz to the backend and played back at 24kHz.<br>
            Requires a modern browser with Web Audio API.
        </div>

        <div id="log" class="log"></div>
    </div>

    <script>
        const talkBtn = document.getElementById('talkBtn');
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        const deviceIdEl = document.getElementById('deviceId');
        const tokenEl = document.getElementById('token');
        const characterEl = document.getElementById('character');
        const childAgeEl = document.getElementById('childAge');

        const WS_URL = `ws://${window.location.host}/ws/voice`;

        let ws = null;
        let audioContext = null;
        let inputNode = null;
        let mediaStream = null;
        let playbackQueue = [];
        let isPlaying = false;
        let isConnected = false;

        function log(msg, cls = '') {
            const p = document.createElement('p');
            p.className = cls;
            p.textContent = `${new Date().toLocaleTimeString()} — ${msg}`;
            logEl.appendChild(p);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(text, state) {
            statusEl.textContent = text;
            statusEl.className = `status ${state}`;
        }

        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        function resample(source, sourceRate, targetRate) {
            if (sourceRate === targetRate) return source;
            const ratio = targetRate / sourceRate;
            const newLength = Math.round(source.length * ratio);
            const result = new Float32Array(newLength);
            for (let i = 0; i < newLength; i++) {
                result[i] = source[Math.round(i / ratio)];
            }
            return result;
        }

        async function startMic() {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: 16000,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                }
            });

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            await audioContext.resume();

            const source = audioContext.createMediaStreamSource(mediaStream);
            const bufferSize = 4096;
            inputNode = audioContext.createScriptProcessor(bufferSize, 1, 1);

            // Zero-gain output so the ScriptProcessorNode stays alive without
            // feeding microphone audio back to the speakers.
            const zeroGain = audioContext.createGain();
            zeroGain.gain.value = 0;
            inputNode.connect(zeroGain);
            zeroGain.connect(audioContext.destination);

            inputNode.onaudioprocess = (e) => {
                if (!isConnected) return;
                const inputData = e.inputBuffer.getChannelData(0);
                const resampled = resample(inputData, audioContext.sampleRate, 16000);
                const pcm16 = floatTo16BitPCM(resampled);
                const buffer = pcm16.buffer;
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(buffer);
                }
            };

            source.connect(inputNode);
        }

        async function playAudio() {
            if (isPlaying || playbackQueue.length === 0) return;
            isPlaying = true;

            const sampleRate = 24000;
            const playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });

            while (playbackQueue.length > 0) {
                const int16Data = playbackQueue.shift();
                const floatData = new Float32Array(int16Data.length);
                for (let i = 0; i < int16Data.length; i++) {
                    const s = int16Data[i];
                    floatData[i] = s < 0 ? s / 0x8000 : s / 0x7FFF;
                }

                const buffer = playContext.createBuffer(1, floatData.length, sampleRate);
                buffer.copyToChannel(floatData, 0);

                const source = playContext.createBufferSource();
                source.buffer = buffer;
                source.connect(playContext.destination);

                await new Promise(resolve => {
                    source.onended = resolve;
                    source.start();
                });
            }

            await playContext.close();
            isPlaying = false;
        }

        function connect() {
            const deviceId = encodeURIComponent(deviceIdEl.value || 'test-device-1');
            const token = encodeURIComponent(tokenEl.value || 'local-test-key');
            const character = encodeURIComponent(characterEl.value || 'zippy');
            const childAge = childAgeEl.value || 7;

            const url = `${WS_URL}/${deviceId}?token=${token}&character_id=${character}&child_age=${childAge}`;
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = async () => {
                isConnected = true;
                setStatus('Connected — starting mic...', 'listening');
                log('Connected to voice agent', 'bot');
                try {
                    await startMic();
                    setStatus('Listening — talk now', 'listening');
                    talkBtn.textContent = 'Stop';
                    talkBtn.disabled = false;
                } catch (err) {
                    setStatus('Mic error: ' + err.message, 'error');
                    log('Mic error: ' + err.message, 'user');
                }
            };

            ws.onmessage = (event) => {
                if (event.data instanceof ArrayBuffer) {
                    const int16 = new Int16Array(event.data);
                    playbackQueue.push(int16);
                    setStatus('Agent is speaking...', 'speaking');
                    playAudio().then(() => {
                        if (playbackQueue.length === 0) setStatus('Listening — talk now', 'listening');
                    });
                } else {
                    try {
                        const data = JSON.parse(event.data);
                        log('Event: ' + JSON.stringify(data), 'event');
                        if (data.state) setStatus(data.state, data.state === 'speaking' ? 'speaking' : 'listening');
                    } catch {
                        log('Text: ' + event.data, 'bot');
                    }
                }
            };

            ws.onerror = (err) => {
                setStatus('Connection error', 'error');
                log('WebSocket error', 'user');
            };

            ws.onclose = () => {
                isConnected = false;
                setStatus('Disconnected', 'idle');
                log('Disconnected', 'user');
                talkBtn.textContent = 'Start';
                talkBtn.disabled = false;
                stopMic();
            };
        }

        function stopMic() {
            if (inputNode) {
                inputNode.disconnect();
                inputNode = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
            stopMic();
        }

        talkBtn.addEventListener('click', () => {
            if (isConnected) {
                talkBtn.disabled = true;
                disconnect();
            } else {
                talkBtn.disabled = true;
                connect();
            }
        });

        talkBtn.disabled = false;
        log('Ready. Click Start to connect.', 'bot');
    </script>
</body>
</html>
