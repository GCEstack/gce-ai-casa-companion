<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kid Voice Agent — Test Client</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.75rem 1.25rem; margin-right: 0.5rem; font-size: 1rem; }
    #log { background: #111; color: #0f0; font-family: monospace; padding: 1rem; height: 300px; overflow-y: auto; margin-top: 1rem; white-space: pre-wrap; }
    .controls { margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>Kid Voice Agent — Test Client</h1>
  <p>Sends 16 kHz mono PCM16 audio and receives the same format. You can also send text messages.</p>

  <div class="controls">
    <button id="startBtn">Start Voice</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <div>
    <input type="text" id="textInput" placeholder="Or type a message..." style="width: 70%; padding: 0.5rem;" />
    <button id="sendTextBtn">Send Text</button>
  </div>

  <div id="log"></div>

  <script>
    const SAMPLE_RATE = 16000;
    const WS_URL = 'ws://localhost:8000/ws/voice';

    let ws = null;
    let audioCtx = null;
    let micStream = null;
    let scriptNode = null;
    let sourceNode = null;
    let playTime = 0;
    let isPlaying = false;

    const logEl = document.getElementById('log');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const textInput = document.getElementById('textInput');
    const sendTextBtn = document.getElementById('sendTextBtn');

    function log(msg) {
      logEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function float32ToPcm16(float32Array) {
      const int16 = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        int16[i] = s < 0 ? s * 32768 : s * 32767;
      }
      return new Uint8Array(int16.buffer);
    }

    function playPcm16(audioData) {
      if (!audioCtx) return;
      const int16 = new Int16Array(audioData.buffer.slice(audioData.byteOffset, audioData.byteOffset + audioData.byteLength));
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768.0;
      }
      const buffer = audioCtx.createBuffer(1, float32.length, SAMPLE_RATE);
      buffer.copyToChannel(float32, 0);
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(audioCtx.destination);

      const now = audioCtx.currentTime;
      if (now > playTime) playTime = now;
      src.start(playTime);
      playTime += buffer.duration;
    }

    async function startVoice() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
        await audioCtx.resume();

        ws = new WebSocket(WS_URL);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => log('WebSocket connected');
        ws.onclose = () => log('WebSocket closed');
        ws.onerror = (e) => log('WebSocket error');
        ws.onmessage = (event) => {
          if (event.data instanceof ArrayBuffer) {
            playPcm16(new Uint8Array(event.data));
          } else {
            log(`Text: ${event.data}`);
          }
        };

        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });

        sourceNode = audioCtx.createMediaStreamSource(micStream);
        scriptNode = audioCtx.createScriptProcessor(1024, 1, 1);
        scriptNode.onaudioprocess = (e) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            const pcm = float32ToPcm16(e.inputBuffer.getChannelData(0));
            ws.send(pcm);
          }
        };

        sourceNode.connect(scriptNode);
        scriptNode.connect(audioCtx.destination);
        isPlaying = true;

        startBtn.disabled = true;
        stopBtn.disabled = false;
        log('Microphone started');
      } catch (err) {
        log('Error starting voice: ' + err.message);
      }
    }

    function stopVoice() {
      if (scriptNode) scriptNode.disconnect();
      if (sourceNode) sourceNode.disconnect();
      if (micStream) micStream.getTracks().forEach(t => t.stop());
      if (ws) ws.close();
      if (audioCtx) audioCtx.close();
      isPlaying = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      log('Stopped');
    }

    function sendText() {
      const text = textInput.value.trim();
      if (!text) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('WebSocket not open');
        return;
      }
      ws.send(JSON.stringify({ type: 'text', text }));
      textInput.value = '';
      log('Sent text: ' + text);
    }

    startBtn.addEventListener('click', startVoice);
    stopBtn.addEventListener('click', stopVoice);
    sendTextBtn.addEventListener('click', sendText);
    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });
  </script>
</body>
</html>
