<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Voice — NFC Tap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    #icon { font-size: 80px; margin-bottom: 20px; }
    #status { font-size: 1.4rem; margin-bottom: 12px; }
    #detail { font-size: 0.95rem; opacity: 0.7; margin-bottom: 24px; max-width: 300px; }
    #spinner {
      width: 40px; height: 40px;
      border: 4px solid #333; border-top: 4px solid #0f0;
      border-radius: 50%; animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .success { color: #0f0; }
    .error { color: #e11; }
    button {
      padding: 12px 24px; border-radius: 8px; border: none;
      background: #333; color: #fff; font-size: 1rem; cursor: pointer;
    }
    button.primary { background: #0a0; }
  </style>
</head>
<body>
  <div id="icon">📲</div>
  <div id="status">Tapping...</div>
  <div id="spinner"></div>
  <div id="detail"></div>
  <button id="closeBtn" style="display:none;">Close</button>

  <script>
    const params = new URLSearchParams(location.search);
    const action = params.get("action");
    const sessionId = params.get("session_id") || "default";
    const character = params.get("character");
    const mode = params.get("mode");
    const scene = params.get("scene");

    const statusEl = document.getElementById("status");
    const detailEl = document.getElementById("detail");
    const spinnerEl = document.getElementById("spinner");
    const closeBtn = document.getElementById("closeBtn");
    const iconEl = document.getElementById("icon");

    function describeAction() {
      if (action === "character") return "Switching to " + (character || "default");
      if (action === "mode") return "Switching mode to " + (mode || "default");
      if (action === "interrupt") return "Stopping speech";
      if (action === "reset") return "Resetting session";
      if (action === "volume_up") return "Volume up";
      if (action === "volume_down") return "Volume down";
      if (action === "scene") return "Starting " + (scene || "greeting") + " scene";
      if (action === "wake") return "Waking up";
      return action;
    }

    async function doTap() {
      if (!action) {
        statusEl.textContent = "No action";
        detailEl.textContent = "This NFC tag is missing an action parameter.";
        spinnerEl.style.display = "none";
        iconEl.textContent = "❌";
        iconEl.className = "error";
        closeBtn.style.display = "inline-block";
        return;
      }

      detailEl.textContent = describeAction() + " in session " + sessionId;

      try {
        const tapParams = new URLSearchParams();
        tapParams.set("session_id", sessionId);
        tapParams.set("action", action);
        if (character) tapParams.set("character", character);
        if (mode) tapParams.set("mode", mode);
        if (scene) tapParams.set("scene", scene);

        const resp = await fetch("/api/tap?" + tapParams.toString());
        const data = await resp.json();

        spinnerEl.style.display = "none";
        if (resp.ok) {
          statusEl.textContent = "Done!";
          statusEl.className = "success";
          iconEl.textContent = "✅";
          iconEl.className = "success";
          detailEl.textContent = describeAction() + " in session " + sessionId;
        } else {
          statusEl.textContent = "Failed";
          statusEl.className = "error";
          iconEl.textContent = "❌";
          iconEl.className = "error";
          detailEl.textContent = data.detail || "Unknown error";
        }
      } catch (err) {
        spinnerEl.style.display = "none";
        statusEl.textContent = "Failed";
        statusEl.className = "error";
        iconEl.textContent = "❌";
        iconEl.className = "error";
        detailEl.textContent = err.message;
      }
      closeBtn.style.display = "inline-block";
    }

    closeBtn.addEventListener("click", () => {
      window.close();
      // Fallback: navigate away
      document.body.innerHTML = "<h2>You can close this tab.</h2>";
    });

    doTap();
  </script>
</body>
</html>
