app = "casa-voice-agent"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  ENV = "production"
  # Allowed CORS origins for the mobile PWA and landing sites.
  # Replace / extend with the actual Vercel deployment URLs from your dashboard.
  # PARENT_PHONE_JOIN_ORIGIN = "https://casa-mobile-main.vercel.app"  # marker: update with real parent-phone URL
  CORS_ALLOWED_ORIGINS = "https://casa-companion-app.fly.dev,https://casa-web-mobile-liam.fly.dev,https://casa-web-mobile-peter.fly.dev,https://casa-web-mobile-jenny.fly.dev,https://casa-web-mobile-jimmy.fly.dev,https://casa-redesign-temp.vercel.app,https://casa-landing.vercel.app"
  # Silero VAD enabled — uses ~180 MB RAM on first utterance (lazy load). 2 GB machine is sufficient.
  SILERO_VAD_DISABLED = "0"
  # Wake-word disabled: set PORCUPINE_ACCESS_KEY in Fly secrets to enable.
  # Custom 'Hey Casa' .ppn model not yet shipped; will use built-in 'porcupine' keyword when enabled.
  WAKE_WORD_DISABLED = "1"
  # Native audio disabled: set to "1" and configure OPENROUTER_NATIVE_AUDIO_MODEL to enable quick-chat fast path.
  NATIVE_AUDIO_ENABLED = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
