app = "casa-voice-agent"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  ENV = "production"
  # Low-memory / cost-conscious tuning: disable heavy optional ML backends.
  WAKE_WORD_DISABLED = "1"
  SILERO_VAD_DISABLED = "1"
  NATIVE_AUDIO_ENABLED = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
